<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐶 Alverse | Cloud System</title>
    <!-- Firebase SDK (Compat Version for ease of use) -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-storage-compat.js"></script>
    
    <style>
        :root { --header-brown: #2d1b15; --body-beige: #f5f5dc; --card-white: #fffdf0; --btn-yellow: #f0e68c; --text-main: #333; --accent: #ffab00; }
        body.dark-mode { --body-beige: #121212; --card-white: #1e1e1e; --text-main: #e0e0e0; --header-brown: #000; }
        body { margin: 0; background: var(--body-beige); color: var(--text-main); font-family: sans-serif; min-height: 100vh; display: flex; flex-direction: column; transition: 0.3s; overflow-x: hidden; }
        
        header { background: var(--header-brown); padding: 0 25px; display: grid; grid-template-columns: 180px 1fr 220px; align-items: center; position: sticky; top: 0; z-index: 1000; height: 65px; }
        .logo { color: var(--btn-yellow); font-size: 24px; font-weight: 900; cursor: pointer; }
        
        .header-center { display: flex; justify-content: center; }
        .search-bar { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; padding: 6px 15px; width: 250px; display: flex; }
        .search-bar input { border: none; width: 100%; outline: none; background: transparent; color: white; font-size: 14px; }

        .header-right { display: flex; justify-content: flex-end; gap: 8px; }
        .nav-btn { background: var(--btn-yellow); border: none; width: 42px; height: 42px; border-radius: 10px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 0 #c0b764; }

        .dropdown { position: relative; }
        .dropdown-content { display: none; position: absolute; right: 0; top: 55px; background: #1a1a1a; min-width: 200px; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 2000; }
        .dropdown.active .dropdown-content { display: block; }
        .dropdown-content div { color: #eee; padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #333; font-size: 14px; }
        .dropdown-content div:hover { background: #333; }

        main { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 25px; flex: 1; }
        .post-card { background: var(--card-white); border-radius: 18px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .post-card img { width: 100%; height: 180px; object-fit: cover; }
        .post-content { padding: 15px; }

        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
        .modal-content { background: var(--card-white); margin: 5vh auto; padding: 25px; width: 90%; max-width: 550px; border-radius: 20px; max-height: 85vh; overflow-y: auto; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        
        footer { background: var(--header-brown); color: #888; text-align: center; padding: 30px 20px; font-size: 13px; }
        footer a { color: var(--btn-yellow); text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body onclick="closeAllPopups(event)">

<header>
    <div class="logo" onclick="location.reload()">🐶 Alverse</div>
    <div class="header-center"><div class="search-bar"><input type="text" placeholder="アーカイブを検索..."></div></div>
    <div class="header-right">
        <button class="nav-btn" onclick="openModal('catModal')">😸</button>
        <button class="nav-btn" onclick="openModal('galModal')">🖼️</button>
        <button class="nav-btn" onmousedown="startL()" onmouseup="stopL()" onclick="toggleDarkMode()">🌛</button>
        <div class="dropdown" id="gearMenu">
            <button class="nav-btn" onclick="toggleGear(event)">⚙️</button>
            <div class="dropdown-content">
                <div onclick="openModal('bgmModal')">🎸 BGM</div>
                <div onclick="openModal('adminModal')" id="adminLink" style="display:none; color:var(--accent);">🛠 管理パネル</div>
                <div onclick="logout()" id="logoutBtn" style="display:none; color:red;">🔓 ログアウト</div>
                <div style="background:#444; text-align:center; font-size:11px;" onclick="toggleGear(event)">メニューを閉じる</div>
            </div>
        </div>
    </div>
</header>

<main id="mainGrid"></main>

<!-- 掲示板 -->
<div id="catModal" class="modal"><div class="modal-content">
    <h2>😸 猫の知恵袋</h2>
    <input type="text" id="bTitle" placeholder="スレッド名">
    <textarea id="bBody" placeholder="内容を書く..." rows="4"></textarea>
    <button class="nav-btn" style="width:100%;" onclick="addBoard()">書き込む</button>
    <div id="boardFeed" style="margin-top:20px;"></div>
    <button onclick="closeModal('catModal')" style="width:100%; margin-top:10px;">閉じる</button>
</div></div>

<!-- BGM -->
<div id="bgmModal" class="modal"><div class="modal-content">
    <h2>🎸 BGM プレイヤー</h2>
    <div style="background:#000; border-radius:15px; overflow:hidden; margin-bottom:10px;">
        <div style="position:relative; padding-bottom:56.25%;"><div id="y-player" style="position:absolute; width:100%; height:100%;"></div></div>
    </div>
    <input type="text" id="ytU" placeholder="YouTube URL">
    <button class="nav-btn" style="width:100%;" onclick="addTrack()">追加</button>
    <div id="playlist" style="margin-top:10px; max-height:200px; overflow-y:auto;"></div>
    <button onclick="closeModal('bgmModal')" style="width:100%; margin-top:10px;">閉じる</button>
</div></div>

<!-- 管理 -->
<div id="adminModal" class="modal"><div class="modal-content">
    <h2>🛠 記事投稿</h2>
    <input type="text" id="pTitle" placeholder="タイトル">
    <input type="text" id="pImg" placeholder="画像URL">
    <textarea id="pBody" placeholder="本文..."></textarea>
    <button class="nav-btn" style="width:100%;" onclick="savePostCloud()">投稿する</button>
    <button onclick="closeModal('adminModal')" style="width:100%; margin-top:10px;">閉じる</button>
</div></div>

<footer>
    <a href="#">プライバシーポリシー</a> | <a href="#">お問い合わせ</a> | <a href="https://www.youtube.com/@kenya896">📺 YouTube</a>
    <p style="margin-top:15px;">© 2026 Alverse. Powered by Google AdSense.</p>
</footer>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    // --- YOUR FIREBASE CONFIG (REF: スクリーンショット 2026-05-01 012003.png) ---
    const firebaseConfig = {
        apiKey: "AIzaSyDbw7xkeplmYAE80JcrTif1qKRpZsDTwXM",
        authDomain: "alverse-project.firebaseapp.com",
        projectId: "alverse-project",
        storageBucket: "alverse-project.firebasestorage.app",
        messagingSenderId: "87056438397",
        appId: "1:87056438397:web:d372f90b2b150e095791d4",
        measurementId: "G-QQV3P9VW00"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let isAdmin = localStorage.getItem('al_admin') === 'true';
    let player, timer, currentTrackIdx = 0;
    let localTracks = JSON.parse(localStorage.getItem('al_tracks')) || [];

    function openModal(id) { document.getElementById(id).style.display='block'; }
    function closeModal(id) { document.getElementById(id).style.display='none'; }
    function toggleGear(e) { e.stopPropagation(); document.getElementById('gearMenu').classList.toggle('active'); }
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    function closeAllPopups(e) { if(!e.target.closest('.dropdown')) document.getElementById('gearMenu').classList.remove('active'); }

    // 管理者認証
    function startL() { timer = setTimeout(() => { if(prompt("Pass:")==="admin"){ isAdmin=true; localStorage.setItem('al_admin','true'); location.reload(); } }, 1000); }
    function stopL() { clearTimeout(timer); }
    function logout() { isAdmin=false; localStorage.removeItem('al_admin'); location.reload(); }

    // Firestore 連携
    async function savePostCloud() {
        await db.collection("posts").add({ title:document.getElementById('pTitle').value, img:document.getElementById('pImg').value, body:document.getElementById('pBody').value, time: Date.now() });
        closeModal('adminModal');
    }
    async function addBoard() {
        const t = document.getElementById('bTitle').value;
        const b = document.getElementById('bBody').value;
        if(t && b) { await db.collection("board").add({t, b, time: Date.now()}); document.getElementById('bTitle').value=""; document.getElementById('bBody').value=""; }
    }

    // リアルタイム反映
    db.collection("posts").orderBy("time", "desc").onSnapshot(snap => {
        document.getElementById('mainGrid').innerHTML = snap.docs.map(doc => {
            const p = doc.data();
            return `<div class="post-card"><img src="${p.img}"><h3>${p.title}</h3><p>${p.body}</p>
            ${isAdmin ? `<button onclick="db.collection('posts').doc('${doc.id}').delete()">[削除]</button>` : ''}</div>`;
        }).join('');
    });
    db.collection("board").orderBy("time", "desc").onSnapshot(snap => {
        document.getElementById('boardFeed').innerHTML = snap.docs.map(doc => `<div style="border-bottom:1px solid #ccc; padding:10px;"><b>${doc.data().t}</b><br>${doc.data().b}</div>`).join('');
    });

    // YouTube
    function onYouTubeIframeAPIReady() { player = new YT.Player('y-player', { videoId: '', events: { 'onStateChange': e => { if(e.data === YT.PlayerState.ENDED) playNext(); } } }); }
    function addTrack() {
        const url = document.getElementById('ytU').value;
        const vid = url.match(/(?:v=|\/)([a-zA-Z0-9_-]{11})/)?.[1];
        if(vid) { localTracks.push({id: vid, n: "Track"}); localStorage.setItem('al_tracks', JSON.stringify(localTracks)); renderTracks(); }
    }
    function renderTracks() {
        document.getElementById('playlist').innerHTML = localTracks.map((t,i) => `<div>${t.n} <span onclick="player.loadVideoById('${t.id}')">▶️</span></div>`).join('');
    }
    window.onload = () => { renderTracks(); if(isAdmin){ document.getElementById('adminLink').style.display='block'; document.getElementById('logoutBtn').style.display='block'; } };
</script>
</body>
</html>
