<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AIverse | Multi-Dimensional Library</title>
    <style>
        :root { --accent: #00d4ff; --bg: #000; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Inter', sans-serif; color: #fff; }
        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }

        /* ナビゲーション */
        #top-right-nav { position: fixed; top: 30px; right: 30px; z-index: 10000; display: flex; gap: 25px; }
        .nav-icon { font-size: 1.8rem; cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .nav-icon:hover { opacity: 1; transform: scale(1.1); }

        /* ロゴ */
        #logo-container { position: fixed; top: 30px; left: 30px; z-index: 1000; display: flex; align-items: center; gap: 12px; font-size: 1.5rem; color: var(--accent); }

        /* 知恵袋（保存箱）のデザイン */
        #wisdom-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 500px; background: rgba(10, 20, 30, 0.95);
            border: 1px solid var(--accent); padding: 25px; border-radius: 15px;
            display: none; flex-direction: column; z-index: 99999; box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }
        #wisdom-modal.show { display: flex; }
        #wisdom-input {
            width: 100%; height: 120px; background: rgba(255,255,255,0.05); color: #fff;
            border: 1px solid rgba(0, 212, 255, 0.2); padding: 12px; box-sizing: border-box;
            font-size: 1rem; resize: none; margin-bottom: 15px; border-radius: 8px;
        }
        .wisdom-btns { display: flex; justify-content: flex-end; gap: 10px; }
        button { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 8px 15px; cursor: pointer; border-radius: 5px; }
        button:hover { background: var(--accent); color: #000; }
        
        #galaxy-notes { margin-top:20px; border-top:1px solid #333; padding-top:10px; overflow-y:auto; max-height:200px; font-size:0.9rem; }
    </style>
</head>
<body>
    <div id="logo-container">AIverse</div>
    
    <div id="top-right-nav">
        <div class="nav-icon" onclick="toggleWisdom()">😸</div>
        <div class="nav-icon" onclick="location.reload()">⚙</div>
    </div>

    <div id="wisdom-modal">
        <textarea id="wisdom-input" placeholder="宇宙に刻むメッセージを入力してワン！"></textarea>
        <div class="wisdom-btns">
            <button onclick="toggleWisdom()">閉じる</button>
            <button onclick="saveWisdomServer()">宇宙に保存する</button>
        </div>
        <div id="galaxy-notes"></div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        // --- 星空の背景アニメーション ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            stars = Array.from({length: 200}, () => ({
                x: Math.random() * width - width/2, y: Math.random() * height - height/2, z: Math.random() * width
            }));
        }
        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, width, height);
            stars.forEach(s => {
                s.z -= 2; if (s.z <= 0) s.z = width;
                let f = 600 / s.z;
                let x = s.x * f + width/2; let y = s.y * f + height/2;
                if (x > 0 && x < width && y > 0 && y < height) {
                    ctx.fillStyle = `rgba(0, 212, 255, ${1 - s.z/width})`;
                    ctx.beginPath(); ctx.arc(x, y, (1 - s.z/width) * 2, 0, Math.PI*2); ctx.fill();
                }
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', init);
        init(); draw();

        // --- サーバー保存機能 ---
        function toggleWisdom() {
            document.getElementById('wisdom-modal').classList.toggle('show');
            loadArticles();
        }

        async function loadArticles() {
            try {
                const res = await fetch('/api/articles');
                const articles = await res.json();
                const container = document.getElementById('galaxy-notes');
                container.innerHTML = articles.reverse().map(a => 
                    `<div style="border-bottom:1px solid #222; padding:8px; color:#00d4ff;">${a.text}</div>`
                ).join('');
            } catch (e) { console.error(e); }
        }

        async function saveWisdomServer() {
            const input = document.getElementById('wisdom-input');
            const text = input.value;
            if(!text) return;

            await fetch('/api/articles', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text: text })
            });

            input.value = '';
            loadArticles();
        }
        window.addEventListener('DOMContentLoaded', loadArticles);
    </script>
</body>
</html>
